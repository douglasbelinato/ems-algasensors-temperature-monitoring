spring:
  application.name: temperature-monitoring
  datasource:
    username: sa
    password: '123'
    url: jdbc:h2:mem:temperature-monitoring-it;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false